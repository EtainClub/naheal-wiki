name: Compile Wiki

on:
  push:
    paths: ["raw/**"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get changed raw files
        id: changed
        run: |
          FILES=$(git diff --name-only HEAD~1 HEAD -- raw/ | tr '\n' ' ')
          echo "files=$FILES" >> $GITHUB_OUTPUT
          echo "Changed files: $FILES"

      - uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync

      - name: Compile wiki (incremental)
        run: |
          if [ -n "${{ steps.changed.outputs.files }}" ]; then
            uv run compile --changed-files ${{ steps.changed.outputs.files }}
          else
            uv run compile
          fi
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Commit wiki changes
        run: |
          git config user.name "wiki-bot"
          git config user.email "wiki-bot@naheal.org"
          git add wiki/
          git diff --staged --quiet && echo "변경 없음" || git commit -m "auto: compile wiki [skip ci]"
          git push
